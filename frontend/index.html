<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTrack - Gestión Académica</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <h1>UniTrack - Sistema de Estructuras de Datos</h1>
        <p>Universidad Regional de Guatemala</p>
    </header>

    <main class="container">
        <!-- Sección de Registro de Estudiantes -->
        <section class="card">
            <h2>Registrar Estudiante (Lista Enlazada Simple)</h2>
            <form id="formEstudiante" onsubmit="registrarEstudiante(event)">
                <div class="form-group">
                    <input type="text" id="carnet" placeholder="Carnet (Ej: 2024001)" required>
                    <input type="text" id="nombres" placeholder="Nombres" required>
                </div>
                <div class="form-group">
                    <input type="text" id="apellidos" placeholder="Apellidos" required>
                    <input type="email" id="correo" placeholder="Correo Electrónico" required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">Registrar al Final</button>
                    <button type="button" class="btn-secondary" onclick="invertirLista()">Invertir Lista
                        (In-Place)</button>
                </div>
            </form>
        </section>

        <!-- Visualización de la Lista Enlazada Simple -->
        <section class="card">
            <h2>Visualización de Estudiantes</h2>
            <div id="listaEstudiantes" class="nodos-display">
                <!-- Se renderiza vía api.js con flechas → -->
            </div>
        </section>
    </main>

    <!-- Modal para Historial (Lista Doblemente Enlazada) -->
    <div id="modalHistorial" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>

            <div class="modal-header-actions">
                <h2>Historial de Inscripciones (DLL)</h2>
                <!-- NUEVO: Botón para ordenar la Lista Doble -->
                <button type="button" class="btn-secondary" onclick="ordenarHistorial()" style="margin-bottom: 15px;">
                    排序 Ordenar por Semestre
                </button>
            </div>

            <div id="contenidoHistorial">
                <!-- Se renderiza vía api.js con flechas ↔ -->
            </div>

            <hr>

            <h3>Inscribir Nuevo Curso</h3>
            <form id="formInscripcion" onsubmit="agregarInscripcion(event)">
                <!-- Campo oculto para saber a qué estudiante pertenece el curso -->
                <input type="hidden" id="carnetHistorial">

                <div class="form-group">
                    <input type="text" id="codigoCurso" placeholder="Código (Ej: 001)" required>
                    <input type="text" id="nombreCurso" placeholder="Nombre del Curso" required>
                </div>
                <div class="form-group">
                    <input type="number" id="semestre" placeholder="Semestre" required>
                    <input type="number" id="nota" placeholder="Nota" required>
                </div>
                <button type="submit" class="btn-success">Guardar en Historial (DLL)</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Funciones de control de interfaz
        function cerrarModal() {
            document.getElementById('modalHistorial').style.display = 'none';
        }

        // Cerrar modal si se hace clic fuera de la caja blanca
        window.onclick = function (event) {
            const modal = document.getElementById('modalHistorial');
            if (event.target == modal) {
                cerrarModal();
            }
        }
    </script>
</body>

</html>
